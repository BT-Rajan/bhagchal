<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Cogzi BEINT v1.0 — Sign In</title>
<link rel="stylesheet" href="/static/css/main.css">
<script src="/static/js/theme.js"></script>
</head>
<body>
<div class="auth-root">

  <div class="auth-brand">
    <div class="wordmark" style="justify-content:center">
      <div class="wm-icon">
        <svg viewBox="0 0 18 18"><path d="M2 2h5v5H2zM11 2h5v5h-5zM2 11h5v5H2zM11 11h5v5h-5z"/></svg>
      </div>
      <div class="wm-text">
        <div class="wm-name">Cogzi <em>BEINT</em></div>
        <div class="wm-ver">v1.0 · Behavioral Intelligence</div>
      </div>
    </div>
    <div class="auth-tagline">Psychometric Assessment Platform</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
      <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Register</button>
      <button class="auth-tab"        id="tab-forgot"   onclick="showTab('forgot')">Reset</button>
    </div>

    <div class="auth-form show" id="form-login">
      <div class="field"><label>Username</label><input id="li-user" type="text" placeholder="username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="msg err" id="li-err"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <div class="auth-hint">Demo &nbsp;·&nbsp; <strong>admin / admin</strong> &nbsp;·&nbsp; <strong>guest / guest</strong></div>
    </div>

    <div class="auth-form" id="form-register">
      <div class="field"><label>Username</label><input id="reg-user" type="text" placeholder="choose a username"></div>
      <div class="field"><label>Password</label><input id="reg-pass" type="password" placeholder="min 4 characters"></div>
      <div class="field"><label>Confirm Password</label><input id="reg-pass2" type="password" placeholder="repeat password"></div>
      <div class="field"><label>Email <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="reg-email" type="email" placeholder="you@company.com"></div>
      <div class="msg err" id="reg-err"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    </div>

    <div class="auth-form" id="form-forgot">
      <p style="font-size:12px;color:var(--text-dim);line-height:1.65">Enter your username to generate a one-time reset token valid for 5 minutes.</p>
      <div class="field"><label>Username</label><input id="fp-user" type="text" placeholder="your username"></div>
      <div class="msg err" id="fp-err"></div>
      <div class="msg ok"  id="fp-ok"></div>
      <div class="token-box" id="fp-token-display"></div>
      <button class="btn btn-primary" onclick="doForgot()">Generate Token</button>
      <div id="fp-fields" style="display:none;flex-direction:column;gap:10px">
        <div class="field"><label>Token</label><input id="fp-token-in" type="text" placeholder="paste token"></div>
        <div class="field"><label>New Password</label><input id="fp-newpass" type="password" placeholder="new password"></div>
        <button class="btn btn-primary" onclick="doReset()">Reset Password</button>
      </div>
      <button class="link-btn" onclick="showTab('login')">← Back to Sign In</button>
    </div>
  </div>

  <div class="auth-theme-row">
    Theme &nbsp;
    <div class="theme-switcher">
      <button class="theme-btn" data-t="dark"  title="Dark"   onclick="setTheme('dark')"></button>
      <button class="theme-btn" data-t="light" title="Light"  onclick="setTheme('light')"></button>
      <button class="theme-btn" data-t="corp1" title="Corp 1 — Obsidian" onclick="setTheme('corp1')"></button>
      <button class="theme-btn" data-t="corp2" title="Corp 2 — Emerald"  onclick="setTheme('corp2')"></button>
      <button class="theme-btn" data-t="corp3" title="Corp 3 — Violet"   onclick="setTheme('corp3')"></button>
    </div>
  </div>

  <div class="auth-footer">© Cogzi BEINT v1.0 &nbsp;·&nbsp; Behavioral Assessment Technology</div>

</div>
<script>
function showTab(t){
  ['login','register','forgot'].forEach(x=>{
    document.getElementById('form-'+x).classList.toggle('show',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
}
async function post(url,body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
async function doLogin(){
  const d=await post('/api/auth/login',{username:document.getElementById('li-user').value.trim(),password:document.getElementById('li-pass').value});
  document.getElementById('li-err').textContent=d.ok?'':d.error;
  if(d.ok) window.location.replace('/?t='+Date.now());
}
async function doRegister(){
  const p=document.getElementById('reg-pass').value,p2=document.getElementById('reg-pass2').value;
  const e=document.getElementById('reg-err');
  if(p!==p2){e.textContent='Passwords do not match.';return;}
  const d=await post('/api/auth/register',{username:document.getElementById('reg-user').value.trim(),password:p,email:document.getElementById('reg-email').value.trim()});
  e.textContent=d.ok?'':d.error;
  if(d.ok) window.location.replace('/?t='+Date.now());
}
async function doForgot(){
  const u=document.getElementById('fp-user').value.trim();
  const errEl=document.getElementById('fp-err'),okEl=document.getElementById('fp-ok');
  errEl.textContent='';okEl.textContent='';
  const d=await post('/api/auth/forgot',{username:u});
  if(!d.ok){errEl.textContent=d.error;return;}
  const box=document.getElementById('fp-token-display');
  box.style.display='block';box.textContent='TOKEN: '+d.token+' (valid 5 min)';
  document.getElementById('fp-fields').style.display='flex';
  okEl.textContent='Copy the token above and paste below.';
}
async function doReset(){
  const u=document.getElementById('fp-user').value.trim();
  const t=document.getElementById('fp-token-in').value.trim().toUpperCase();
  const p=document.getElementById('fp-newpass').value;
  const errEl=document.getElementById('fp-err'),okEl=document.getElementById('fp-ok');
  const d=await post('/api/auth/reset',{username:u,token:t,password:p});
  if(!d.ok){errEl.textContent=d.error;return;}
  okEl.textContent='Password updated. Redirecting…';
  setTimeout(()=>showTab('login'),1500);
}
</script>
</body>
</html>
